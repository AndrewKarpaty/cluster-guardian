apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-guardian.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-guardian.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cluster-guardian.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cluster-guardian.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cluster-guardian.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cluster-guardian
          image: "{{ .Values.image.repository }}:{{ include "cluster-guardian.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - serve
            - --listen=0.0.0.0:8080
            - --history-limit={{ .Values.history.limit }}
            {{- if .Values.persistence.enabled }}
            - --history-dir=/data
            {{- end }}
            {{- if .Values.fleet.enabled }}
            - --fleet
            - --fleet-interval={{ .Values.fleet.interval }}
            {{- end }}
            {{- with .Values.prometheusUrl }}
            - --prometheus-url={{ . }}
            {{- end }}
            {{- if .Values.includeSystem }}
            - --include-system
            {{- end }}
            {{- range .Values.namespaces }}
            - --namespace={{ . }}
            {{- end }}
            {{- with .Values.clusterName }}
            - --cluster-name={{ . }}
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: history
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: history
          persistentVolumeClaim:
            claimName: {{ include "cluster-guardian.fullname" . }}-history
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
