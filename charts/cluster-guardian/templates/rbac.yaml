{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-guardian.fullname" . }}
  labels:
    {{- include "cluster-guardian.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - configmaps
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list"]
  {{- if .Values.rbac.includeSecrets }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  {{- end }}
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list"]
  # Optional CRDs — the analyzer degrades gracefully when they are absent.
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "podmonitors", "prometheusrules"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cluster-guardian.fullname" . }}
  labels:
    {{- include "cluster-guardian.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cluster-guardian.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cluster-guardian.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if and .Values.fleet.enabled (not .Values.rbac.includeSecrets) }}
---
# Fleet mode reads cluster-registration Secrets in its own namespace even
# when cluster-wide secret access is disabled.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cluster-guardian.fullname" . }}-fleet
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-guardian.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cluster-guardian.fullname" . }}-fleet
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-guardian.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cluster-guardian.fullname" . }}-fleet
subjects:
  - kind: ServiceAccount
    name: {{ include "cluster-guardian.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
